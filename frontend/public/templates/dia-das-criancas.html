<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dia das Crianças — Feed 1080x1080</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1080px; font-family:'Barlow Condensed',sans-serif; overflow:hidden; display:flex; flex-direction:column; }
.bg { position:absolute; inset:0; background:radial-gradient(ellipse at 20% 30%, #1a0050 0%, #0d0030 50%, #050015 80%); }
.confetti { position:absolute; inset:0; background-image:radial-gradient(3px 3px at 10% 20%, #FF6B6B 0%, transparent 100%), radial-gradient(3px 3px at 25% 60%, #FFD93D 0%, transparent 100%), radial-gradient(3px 3px at 45% 15%, #6BCB77 0%, transparent 100%), radial-gradient(3px 3px at 65% 45%, #4D96FF 0%, transparent 100%), radial-gradient(3px 3px at 80% 25%, #FF6B6B 0%, transparent 100%), radial-gradient(2px 2px at 90% 70%, #FFD93D 0%, transparent 100%), radial-gradient(3px 3px at 15% 85%, #6BCB77 0%, transparent 100%), radial-gradient(2px 2px at 55% 80%, #FF69B4 0%, transparent 100%); }
.stripe { position:absolute; left:0; top:0; bottom:0; width:10px; background:repeating-linear-gradient(180deg, #FF6B6B 0px, #FF6B6B 20px, #FFD93D 20px, #FFD93D 40px, #6BCB77 40px, #6BCB77 60px, #4D96FF 60px, #4D96FF 80px); }
.topo { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:32px 56px 0 66px; }
.logo-wrap img { height:52px; filter:brightness(0) invert(1); }
.tag { background:linear-gradient(135deg,#FF6B6B,#FFD93D); color:white; padding:10px 22px; border-radius:6px; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.titulo-area { position:relative; z-index:10; padding:14px 56px 0 66px; }
.sub { font-size:18px; color:rgba(255,217,61,0.9); letter-spacing:4px; text-transform:uppercase; font-weight:700; margin-bottom:4px; }
.titulo { font-size:92px; font-weight:900; color:white; line-height:0.88; text-transform:uppercase; }
.titulo span { color:#FFD93D; }
.linha { width:120px; height:5px; background:linear-gradient(90deg,#FFD93D,#FF6B6B); margin-top:10px; border-radius:2px; }
.produtos { position:relative; z-index:10; flex:1; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:14px 56px 10px 66px; align-items:center; }
.produto { background:rgba(255,255,255,0.06); border:1px solid rgba(255,217,61,0.25); border-radius:12px; padding:16px 12px; display:flex; flex-direction:column; align-items:center; text-align:center; position:relative; overflow:hidden; }
.produto::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#FFD93D,#FF6B6B); }
.prod-emoji { font-size:34px; margin-bottom:6px; }
.prod-nome { font-size:13px; font-weight:800; color:white; text-transform:uppercase; line-height:1.1; margin-bottom:3px; }
.prod-un { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:8px; }
.prod-preco { display:flex; align-items:flex-start; gap:1px; }
.p-rs { font-size:13px; font-weight:700; color:#FFD93D; margin-top:5px; }
.p-val { font-size:36px; font-weight:900; color:white; line-height:1; }
.p-cts { font-size:15px; font-weight:700; color:rgba(255,255,255,0.7); margin-top:5px; }
.rodape { position:relative; z-index:10; padding:0 56px 26px 66px; display:flex; align-items:center; justify-content:space-between; }
.validade { font-size:12px; color:rgba(255,255,255,0.3); }
.wpp { background:rgba(37,211,102,0.15); border:1px solid rgba(37,211,102,0.3); border-radius:6px; padding:5px 14px; font-size:13px; font-weight:700; color:#25D366; }
</style>
</head>
<body>
<div class="bg"></div><div class="confetti"></div><div class="stripe"></div>
<div class="topo">
  <div class="logo-wrap"><img src="/radio-assets/logotipo.png" alt="Índio"></div>
  <div class="tag">🎉 12 de Outubro</div>
</div>
<div class="titulo-area">
  <div class="sub">Alegria é no Índio!</div>
  <div class="titulo">Dia das<br><span>Crianças</span></div>
  <div class="linha"></div>
</div>
<div class="produtos">
  <div class="produto">
    <div class="prod-emoji">🍭</div>
    <div class="prod-nome">Pirulito Pop</div>
    <div class="prod-un">Unidade</div>
    <div class="prod-preco"><span class="p-rs">R$</span><span class="p-val">0</span><span class="p-cts">,99</span></div>
  </div>
  <div class="produto">
    <div class="prod-emoji">🧃</div>
    <div class="prod-nome">Suco Caixinha</div>
    <div class="prod-un">200ml</div>
    <div class="prod-preco"><span class="p-rs">R$</span><span class="p-val">1</span><span class="p-cts">,49</span></div>
  </div>
  <div class="produto">
    <div class="prod-emoji">🍦</div>
    <div class="prod-nome">Sorvete</div>
    <div class="prod-un">2 litros</div>
    <div class="prod-preco"><span class="p-rs">R$</span><span class="p-val">14</span><span class="p-cts">,90</span></div>
  </div>
  <div class="produto">
    <div class="prod-emoji">🎂</div>
    <div class="prod-nome">Bolo Pronto</div>
    <div class="prod-un">Fatia</div>
    <div class="prod-preco"><span class="p-rs">R$</span><span class="p-val">6</span><span class="p-cts">,90</span></div>
  </div>
</div>
<div class="rodape">
  <span class="validade">Feliz Dia das Crianças! 🎈 Válido até 12/10 • Estoque limitado</span>
  <span class="wpp">📲 (51) 9XXXX-XXXX</span>
</div>
</body></html>
