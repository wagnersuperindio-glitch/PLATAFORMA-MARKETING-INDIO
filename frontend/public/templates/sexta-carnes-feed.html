<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sexta das Carnes — Feed 1080x1080</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1080px; height:1080px;
  background:#0A0A0A;
  font-family:'Barlow Condensed', sans-serif;
  overflow:hidden;
  display:flex; flex-direction:column;
}
.bg {
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 15% 50%, #8B0000 0%, #2d0000 45%, #0A0A0A 75%);
}
.glow-right {
  position:absolute;
  right:-80px; top:-80px;
  width:700px; height:700px;
  background: radial-gradient(circle at 60% 30%, rgba(255,80,0,0.25) 0%, transparent 65%);
}
.stripe-accent {
  position:absolute;
  left:0; top:0; bottom:0; width:10px;
  background: linear-gradient(180deg, #FF6B00, #CC0000);
}

/* TOPO */
.topo {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:36px 56px 0 66px;
}
.logo-wrap img { height:56px; filter:brightness(0) invert(1); }
.tag-dia {
  background:#CC0000;
  color:white;
  padding:10px 26px;
  border-radius:6px;
  font-size:16px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
}

/* TÍTULO */
.titulo-area {
  position:relative; z-index:10;
  padding:24px 56px 0 66px;
}
.subtitulo {
  font-size:20px; color:rgba(255,150,0,0.9);
  letter-spacing:5px; text-transform:uppercase;
  font-weight:700; margin-bottom:4px;
}
.titulo {
  font-size:106px; font-weight:900;
  color:white; line-height:0.88;
  text-transform:uppercase;
  text-shadow: 0 4px 24px rgba(200,0,0,0.6);
}
.titulo span { color:#FF6B00; }
.linha {
  width:130px; height:5px;
  background: linear-gradient(90deg, #FF6B00, #CC0000);
  margin-top:14px; border-radius:2px;
}

/* PRODUTOS */
.produtos {
  position:relative; z-index:10;
  flex:1; display:flex; align-items:center;
  padding:20px 56px 10px 66px;
  gap:22px;
}
.produto {
  flex:1;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  padding:26px 20px;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  backdrop-filter:blur(4px);
  position:relative; overflow:hidden;
}
.produto::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:4px;
  background: linear-gradient(90deg, #FF6B00, #CC0000);
}
.produto-emoji { font-size:52px; margin-bottom:10px; line-height:1; }
.produto-nome {
  font-size:20px; font-weight:800; color:white;
  text-transform:uppercase; letter-spacing:0.5px;
  margin-bottom:4px; line-height:1.1;
}
.produto-kg { font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:1px; margin-bottom:14px; }
.produto-preco {
  display:flex; align-items:flex-start; justify-content:center; gap:2px;
  margin-top:auto;
}
.preco-rs    { font-size:24px; font-weight:700; color:#FF6B00; margin-top:10px; }
.preco-valor { font-size:66px; font-weight:900; color:white; line-height:1; }
.preco-cents { font-size:30px; font-weight:700; color:rgba(255,255,255,0.8); margin-top:10px; }

/* RODAPÉ */
.rodape {
  position:relative; z-index:10;
  padding:0 56px 30px 66px;
  display:flex; align-items:center; justify-content:space-between;
}
.validade { font-size:13px; color:rgba(255,255,255,0.35); letter-spacing:0.5px; }
.wpp {
  background:rgba(37,211,102,0.15);
  border:1px solid rgba(37,211,102,0.3);
  border-radius:6px;
  padding:6px 14px;
  font-size:13px; font-weight:700; color:#25D366;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="glow-right"></div>
<div class="stripe-accent"></div>

<div class="topo">
  <div class="logo-wrap">
    <img src="/radio-assets/logotipo.png" alt="Índio Supermercados">
  </div>
  <div class="tag-dia">🔥 Toda Sexta</div>
</div>

<div class="titulo-area">
  <div class="subtitulo">Promoção Especial</div>
  <div class="titulo">Sexta<br><span>das Carnes</span></div>
  <div class="linha"></div>
</div>

<div class="produtos">
  <div class="produto">
    <div class="produto-emoji">🥩</div>
    <div class="produto-nome">Alcatra Bovina</div>
    <div class="produto-kg">Peça inteira — KG</div>
    <div class="produto-preco">
      <span class="preco-rs">R$</span>
      <span class="preco-valor">29</span>
      <span class="preco-cents">,90</span>
    </div>
  </div>
  <div class="produto">
    <div class="produto-emoji">🍗</div>
    <div class="produto-nome">Frango Inteiro</div>
    <div class="produto-kg">Congelado — KG</div>
    <div class="produto-preco">
      <span class="preco-rs">R$</span>
      <span class="preco-valor">12</span>
      <span class="preco-cents">,90</span>
    </div>
  </div>
  <div class="produto">
    <div class="produto-emoji">🥓</div>
    <div class="produto-nome">Costela Bovina</div>
    <div class="produto-kg">Janela — KG</div>
    <div class="produto-preco">
      <span class="preco-rs">R$</span>
      <span class="preco-valor">24</span>
      <span class="preco-cents">,90</span>
    </div>
  </div>
</div>

<div class="rodape">
  <span class="validade">Válido somente nas sextas-feiras • Enquanto durar o estoque</span>
  <span class="wpp">📲 (51) 9XXXX-XXXX</span>
</div>
</body>
</html>
