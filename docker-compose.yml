version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: indio_marketing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: indio
      POSTGRES_PASSWORD: indio2026
      POSTGRES_DB: indio_marketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: indio_marketing_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
